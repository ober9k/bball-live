<main class="main mx-auto max-w-200">
  <div class="content p-2">
    <h1 class="text-xl my-1 p-1 font-medium">
      bball-live
    </h1>
    <p class="p-1">
      experimental live scoring
    </p>
    <h2 class="my-1 mt-2 p-1 font-medium">
      Box Score
    </h2>
    <app-box-score-table [playerStatsLogs]="playerStatsLogs()" />
    <h2 class="my-1 mt-2 p-1 font-medium">
      Active Score
    </h2>
    <div class="p-1">
      <div class="flex gap-1 justify-center p-1 m-1">
        <div class="border-2 border-gray-200 rounded-full text-gray-600 w-24 h-24 flex justify-center items-center text-2xl flex-col">
          {{remainingSeconds()}}<br/>
          <small class="text-xs text-gray-400">seconds</small>
        </div>
      </div>
      <div class="flex gap-1 justify-center p-1 pb-2">
        <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="startTimer()">Start</button>
        <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="pauseTimer()">Pause</button>
        <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="resetTimer()">Reset</button>
      </div>
    </div>
    <div class="border-1 border-gray-300">
      <table class="w-full">
        <thead>
        <tr class="border-b border-gray-300 bg-gray-200">
          <th class="w-auto p-1 text-left">&nbsp;</th>
          <th class="w-auto p-1 text-right">&nbsp;</th>
        </tr>
        </thead>
        <tbody>
          @for (playerStatsLog of playerStatsLogs(); track playerStatsLog.id) {
            <tr class="odd:bg-gray-100">
              <td class="w-auto p-1">
                {{ playerStatsLog.player.name }}
              </td>
              <td class="w-auto p-1 text-right flex gap-1 justify-end">
                <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="addPoints(playerStatsLog, 1)">+1 PT</button>
                <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="addPoints(playerStatsLog, 2)">+2 PTS</button>
                <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="addPoints(playerStatsLog, 2)">+3 PTS</button>
                <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="addRebounds(playerStatsLog, 1)">+1 REB</button>
                <button class="border-1 border-gray-300 rounded-sm bg-white px-1 text-sm cursor-pointer hover:bg-gray-100" (click)="addAssists(playerStatsLog, 1)">+1 AST</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</main>

<router-outlet />
