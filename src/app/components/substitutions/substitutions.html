<h2 class="p-3 justify-end border-b border-gray-200 text-base bg-gray-100 font-medium">
  Player Substitutions
</h2>
<div class="p-3">
  @if (activePlayersLogs().length !== 5) {
    <p class="m-2 p-2 px-3 border border-red-300 bg-red-100 rounded text-sm text-red-900">
      <strong class="font-medium">Error</strong><br/>
      A total of 5 active players must be selected.
    </p>
  }
  <h3 class="my-1">Active Players</h3>
  <div class="flex flex-wrap gap-1">
    @for (log of activePlayersLogs(); track log.id) {
      <button [ngClass]="cssButtonClasses" (click)="handleActivePlayerLog(log)">{{ log.player.name }}</button>
    }
  </div>
  <h3 class="my-1">Inactive Players</h3>
  <div class="flex flex-wrap gap-1">
    @for (log of inactivePlayersLogs(); track log.id) {
      <button [ngClass]="cssButtonClasses" (click)="handleInactivePlayerLog(log)">{{ log.player.name }}</button>
    }
  </div>
</div>
<div class="flex flex-wrap gap-3 p-3 justify-end border-t border-gray-200">
  <button (click)="cancelSubstitutions()" class="f-button">Cancel</button>
  <button (click)="confirmSubstitutions()" class="f-button f-primary" [disabled]="activePlayersLogs().length !== 5">Confirm</button>
</div>
